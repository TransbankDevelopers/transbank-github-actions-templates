name: Kiuwan PR Scan

on:
  workflow_call:
    inputs:
      project_name:
        description: Kiuwan application name
        required: true
        type: string
      source_path:
        description: Path to scan relative to repository root
        required: false
        default: .
        type: string
      fail_on_audit:
        description: Fail the workflow when Kiuwan reports a failed audit
        required: false
        default: false
        type: boolean
      kiuwan_host:
        description: Internal Kiuwan host used for connectivity validation
        required: false
        default: https://kiuwan.tools.tbk.cl
        type: string
      kiuwan_zip_url:
        description: Kiuwan Local Analyzer distribution URL
        required: false
        default: https://kiuwan.tools.tbk.cl/pub/analyzer/KiuwanLocalAnalyzer.zip
        type: string
    secrets:
      VPN_CONFIG_B64:
        required: true
      VPN_USER:
        required: true
      VPN_PASS:
        required: true
      KIUWAN_USER:
        required: true
      KIUWAN_PASS:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  kiuwan-pr-scan:
    name: Kiuwan PR Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    env:
      SOURCE_PATH: ${{ inputs.source_path }}
      FAIL_ON_AUDIT: ${{ inputs.fail_on_audit }}
      PROJECT_NAME: ${{ inputs.project_name }}
      KIUWAN_HOST: ${{ inputs.kiuwan_host }}
      KIUWAN_ZIP_URL: ${{ inputs.kiuwan_zip_url }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.head_ref || github.event.pull_request.head.ref }}
      PR_COMMIT: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize runtime paths
        shell: bash
        run: |
          set -Eeuo pipefail
          work_dir="${RUNNER_TEMP}/kiuwan-pr-scan"
          log_file="${work_dir}/kiuwan.log"
          analyzer_dir="${work_dir}/KiuwanLocalAnalyzer"
          report_file="${work_dir}/kiuwan-report.md"
          scan_path="${GITHUB_WORKSPACE}/${SOURCE_PATH}"

          {
            echo "WORK_DIR=$work_dir"
            echo "LOG_FILE=$log_file"
            echo "ANALYZER_DIR=$analyzer_dir"
            echo "REPORT_FILE=$report_file"
            echo "SCAN_PATH=$scan_path"
          } >> "$GITHUB_ENV"

      - name: Install required packages
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openvpn curl unzip jq

      - name: Prepare workspace
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$WORK_DIR"

      - name: Validate scan path
        shell: bash
        run: |
          set -Eeuo pipefail

          if [[ ! -e "$SCAN_PATH" ]]; then
            echo "Configured source path does not exist: $SCAN_PATH"
            exit 1
          fi

          if [[ ! -r "$SCAN_PATH" ]]; then
            echo "Configured source path is not readable: $SCAN_PATH"
            exit 1
          fi

          echo "Scan path resolved to: $SCAN_PATH"

      - name: Connect to VPN
        id: vpn
        shell: bash
        env:
          VPN_CONFIG_B64: ${{ secrets.VPN_CONFIG_B64 }}
          VPN_USER: ${{ secrets.VPN_USER }}
          VPN_PASS: ${{ secrets.VPN_PASS }}
        run: |
          set -Eeuo pipefail

          printf '%s' "$VPN_CONFIG_B64" | base64 --decode > "$WORK_DIR/vpn.ovpn"
          printf '%s\n%s\n' "$VPN_USER" "$VPN_PASS" > "$WORK_DIR/auth.txt"
          chmod 600 "$WORK_DIR/auth.txt"

          sudo openvpn \
            --config "$WORK_DIR/vpn.ovpn" \
            --auth-user-pass "$WORK_DIR/auth.txt" \
            --daemon \
            --writepid "$WORK_DIR/openvpn.pid" \
            --log "$WORK_DIR/openvpn.log"

          for attempt in {1..30}; do
            if sudo test -f "$WORK_DIR/openvpn.log" && sudo grep -Eq 'AUTH_FAILED|Exiting due to fatal error|Cannot resolve host address|TLS Error' "$WORK_DIR/openvpn.log"; then
              echo "VPN connection failed"
              sudo cat "$WORK_DIR/openvpn.log"
              exit 1
            fi

            if ip addr show | grep -q 'tun0' && sudo grep -q 'Initialization Sequence Completed' "$WORK_DIR/openvpn.log"; then
              echo "VPN tunnel established on attempt $attempt"
              exit 0
            fi

            sleep 2
          done

          echo "VPN tunnel was not established within the expected time"
          sudo test -f "$WORK_DIR/openvpn.log" && sudo cat "$WORK_DIR/openvpn.log"
          exit 1

      - name: Verify Kiuwan connectivity
        shell: bash
        run: |
          set -Eeuo pipefail

          host_name="$(echo "$KIUWAN_HOST" | sed -E 's#^https?://([^/:]+).*#\1#')"
          vpn_dns="$(sudo sed -n "s/.*dhcp-option DNS \\([0-9.]*\\).*/\\1/p" "$WORK_DIR/openvpn.log" | tail -n 1 || true)"

          if [[ -n "$vpn_dns" ]] && command -v resolvectl >/dev/null 2>&1; then
            sudo resolvectl dns tun0 "$vpn_dns"
            sudo resolvectl domain tun0 '~tbk.cl' '~sdlc.tbk.cl'
            sudo resolvectl flush-caches || true
            echo "Configured VPN DNS $vpn_dns for domains tbk.cl and sdlc.tbk.cl"
          else
            echo "VPN DNS could not be configured automatically"
            echo "Detected VPN DNS: ${vpn_dns:-not found}"
          fi

          echo "Resolved addresses before connectivity check:"
          getent hosts "$host_name" || true

          for attempt in {1..3}; do
            if curl --fail --silent --show-error --location --connect-timeout 10 --max-time 20 "$KIUWAN_HOST" > /dev/null; then
              echo "Kiuwan endpoint reachable on attempt $attempt"
              exit 0
            fi

            echo "Kiuwan endpoint not reachable yet on attempt $attempt"
            sleep 4
          done

          echo "Kiuwan connectivity validation failed"
          echo "Host: $host_name"
          getent hosts "$host_name" || true
          ip addr show tun0 || true
          ip route || true
          cat /etc/resolv.conf || true
          sudo test -f "$WORK_DIR/openvpn.log" && sudo tail -n 100 "$WORK_DIR/openvpn.log" || true
          exit 1

      - name: Download Kiuwan Local Analyzer
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --location "$KIUWAN_ZIP_URL" --output "$WORK_DIR/KiuwanLocalAnalyzer.zip"
          unzip -q "$WORK_DIR/KiuwanLocalAnalyzer.zip" -d "$WORK_DIR"
          test -x "$ANALYZER_DIR/bin/agent.sh"

      - name: Run Kiuwan analysis
        id: scan
        shell: bash
        env:
          KIUWAN_USER: ${{ secrets.KIUWAN_USER }}
          KIUWAN_PASS: ${{ secrets.KIUWAN_PASS }}
        run: |
          set -Eeuo pipefail

          mkdir -p "$(dirname "$LOG_FILE")"
          : > "$LOG_FILE"

          scan_exit_code=0
          set +e
          "$ANALYZER_DIR/bin/agent.sh" \
            -s "$SCAN_PATH" \
            -n "$PROJECT_NAME" \
            -cr "$PR_NUMBER" \
            -bn "$PR_BRANCH" \
            -wr \
            --user "$KIUWAN_USER" \
            --pass "$KIUWAN_PASS" 2>&1 | tee "$LOG_FILE"
          scan_exit_code=${PIPESTATUS[0]}
          set -e

          analysis_url="$(sed -n 's/^Analysis results URL:[[:space:]]*//p' "$LOG_FILE" | tail -n 1 || true)"
          analysis_code="$(sed -n 's/^Analysis created in Kiuwan with code:[[:space:]]*//p' "$LOG_FILE" | tail -n 1 || true)"
          audit_line="$(grep -E '^(Audit passed:[[:space:]]*(true|false)|Audit overall result[[:space:]]*=[[:space:]]*(PASS|FAIL))' "$LOG_FILE" | tail -n 1 || true)"
          error_summary="$(grep -Ei '(^|[[:space:]])(error|errors|exception|failed|failure|fatal)($|:|[[:space:]])' "$LOG_FILE" | tail -n 3 | paste -sd ' | ' - || true)"

          audit_status="unknown"
          if grep -Eq '^Audit passed:[[:space:]]*true' "$LOG_FILE" || grep -Eq '^Audit overall result[[:space:]]*=[[:space:]]*PASS' "$LOG_FILE"; then
            audit_status="passed"
          elif grep -Eq '^Audit passed:[[:space:]]*false' "$LOG_FILE" || grep -Eq '^Audit overall result[[:space:]]*=[[:space:]]*FAIL' "$LOG_FILE"; then
            audit_status="failed"
          fi

          result_message="Kiuwan finished, but the final result could not be classified from the analyzer output."
          if [[ "$audit_status" == "passed" ]]; then
            result_message="Kiuwan completed successfully and the result came back with no observations."
          elif [[ "$audit_status" == "failed" ]]; then
            result_message="Kiuwan completed the execution, but the audit result was FAILED. Review the analysis details."
          fi

          scan_completed="false"
          if [[ -n "$analysis_url" || -n "$analysis_code" || "$audit_status" != "unknown" ]]; then
            scan_completed="true"
          fi

          execution_error="false"
          if [[ "$scan_completed" != "true" && "$scan_exit_code" -ne 0 ]]; then
            execution_error="true"
          fi

          should_fail_job="false"
          if [[ "${FAIL_ON_AUDIT:-false}" == "true" && "$audit_status" != "passed" ]]; then
            should_fail_job="true"
          fi

          {
            echo "scan_exit_code=$scan_exit_code"
            echo "analysis_url=$analysis_url"
            echo "analysis_code=$analysis_code"
            echo "audit_status=$audit_status"
            echo "scan_completed=$scan_completed"
            echo "execution_error=$execution_error"
            echo "should_fail_job=$should_fail_job"
            echo "result_message<<EOF"
            echo "$result_message"
            echo "EOF"
            echo "audit_line<<EOF"
            echo "${audit_line:-No audit line was found in the Kiuwan output.}"
            echo "EOF"
            echo "error_summary<<EOF"
            echo "${error_summary:-No execution errors were detected in the Kiuwan output.}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ "$execution_error" == "true" ]]; then
            echo "Kiuwan failed before leaving a usable analysis result."
            exit 1
          fi

      - name: Publish step summary
        if: steps.scan.outcome == 'success'
        shell: bash
        env:
          ANALYSIS_URL: ${{ steps.scan.outputs.analysis_url }}
          ANALYSIS_CODE: ${{ steps.scan.outputs.analysis_code }}
          AUDIT_STATUS: ${{ steps.scan.outputs.audit_status }}
          RESULT_MESSAGE: ${{ steps.scan.outputs.result_message }}
        run: |
          status_label="Completed"
          if [[ "${AUDIT_STATUS:-unknown}" == "passed" ]]; then
            status_label="Passed"
          elif [[ "${AUDIT_STATUS:-unknown}" == "failed" ]]; then
            status_label="Failed"
          elif [[ "${AUDIT_STATUS:-unknown}" == "unknown" ]]; then
            status_label="Completed (unclassified)"
          fi

          {
            echo "## Kiuwan Scan"
            echo
            echo "**Status:** $status_label"
            echo
            echo "**Result:** ${RESULT_MESSAGE:-Kiuwan finished without a detailed result message.}"
            echo
            echo "**Project:** \`$PROJECT_NAME\`"
            echo
            echo "**Analysis code:** \`${ANALYSIS_CODE:-N/A}\`"
            echo
            if [[ -n "${ANALYSIS_URL:-}" ]]; then
              echo "**Report:** [Open Kiuwan report]($ANALYSIS_URL)"
            else
              echo "**Report:** Not available"
            fi
          } > "$REPORT_FILE"

          cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Replace PR comment
        if: steps.scan.outcome == 'success' && github.event.pull_request.number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const marker = '## Kiuwan Scan';
            const reportPath = process.env.REPORT_FILE;
            const body = reportPath && fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : `${marker}\n\nKiuwan finished, but the report file could not be generated.`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.filter((comment) => comment.body && comment.body.includes(marker));

            for (const comment of existing) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: comment.id
              });
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });

      - name: Fail workflow on failed audit
        if: steps.scan.outcome == 'success' && steps.scan.outputs.should_fail_job == 'true'
        shell: bash
        run: |
          echo "Kiuwan audit failed."
          exit 1

      - name: Cleanup VPN and temporary files
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -f "$WORK_DIR/openvpn.pid" ]]; then
            sudo kill "$(cat "$WORK_DIR/openvpn.pid")" 2>/dev/null || true
          fi
          if command -v resolvectl >/dev/null 2>&1; then
            sudo resolvectl revert tun0 2>/dev/null || true
          fi
          sudo pkill -f "openvpn --config $WORK_DIR/vpn.ovpn" 2>/dev/null || true
          rm -rf "$WORK_DIR"
